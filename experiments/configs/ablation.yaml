# Ablation Study Configuration
# Defines multiple experiments to compare different configurations

ablation_study:
  name: "lfn_ablation_study"
  base_config: "experiments/configs/default.yaml"
  output_dir: "experiments/results/ablation"

# Experiment variations to run
experiments:
  # Baseline: Standard Transformer without latent forecasting
  - name: "baseline_no_latent_loss"
    description: "Standard Transformer (lambda=0)"
    overrides:
      experiment:
        name: "baseline_no_latent"
      training:
        lambda_latent: 0.0

  # Ablation 1: Different lambda values (comprehensive)
  - name: "lambda_0.0"
    description: "No latent loss weight (baseline)"
    overrides:
      experiment:
        name: "lfn_lambda_0.0"
      training:
        lambda_latent: 0.0

  - name: "lambda_0.01"
    description: "Very low latent loss weight"
    overrides:
      experiment:
        name: "lfn_lambda_0.01"
      training:
        lambda_latent: 0.01

  - name: "lambda_0.05"
    description: "Low latent loss weight"
    overrides:
      experiment:
        name: "lfn_lambda_0.05"
      training:
        lambda_latent: 0.05

  - name: "lambda_0.1"
    description: "Medium latent loss weight (default)"
    overrides:
      experiment:
        name: "lfn_lambda_0.1"
      training:
        lambda_latent: 0.1

  - name: "lambda_0.25"
    description: "Medium-high latent loss weight"
    overrides:
      experiment:
        name: "lfn_lambda_0.25"
      training:
        lambda_latent: 0.25

  - name: "lambda_0.5"
    description: "High latent loss weight"
    overrides:
      experiment:
        name: "lfn_lambda_0.5"
      training:
        lambda_latent: 0.5

  - name: "lambda_1.0"
    description: "Very high latent loss weight (equal emphasis)"
    overrides:
      experiment:
        name: "lfn_lambda_1.0"
      training:
        lambda_latent: 1.0

  # Ablation 2: Different forecasting horizons (comprehensive)
  - name: "horizon_1_only"
    description: "Single-step forecasting (k=1)"
    overrides:
      experiment:
        name: "lfn_horizon_1"
      model:
        forecast_horizons: [1]

  - name: "horizon_2_only"
    description: "Single-step forecasting (k=2)"
    overrides:
      experiment:
        name: "lfn_horizon_2"
      model:
        forecast_horizons: [2]

  - name: "horizon_5_only"
    description: "Single-step forecasting (k=5)"
    overrides:
      experiment:
        name: "lfn_horizon_5"
      model:
        forecast_horizons: [5]

  - name: "horizon_10_only"
    description: "Single-step forecasting (k=10)"
    overrides:
      experiment:
        name: "lfn_horizon_10"
      model:
        forecast_horizons: [10]

  - name: "horizon_1_2"
    description: "Two-step forecasting (k=1,2)"
    overrides:
      experiment:
        name: "lfn_horizon_1_2"
      model:
        forecast_horizons: [1, 2]

  - name: "horizon_1_2_5"
    description: "Multi-step forecasting (k=1,2,5) - default"
    overrides:
      experiment:
        name: "lfn_horizon_1_2_5"
      model:
        forecast_horizons: [1, 2, 5]

  - name: "horizon_1_2_5_10"
    description: "Extended multi-step forecasting (k=1,2,5,10)"
    overrides:
      experiment:
        name: "lfn_horizon_1_2_5_10"
      model:
        forecast_horizons: [1, 2, 5, 10]

  - name: "horizon_1_3_5_10_20"
    description: "Long-range multi-step forecasting (k=1,3,5,10,20)"
    overrides:
      experiment:
        name: "lfn_horizon_1_3_5_10_20"
      model:
        forecast_horizons: [1, 3, 5, 10, 20]

  # Ablation 3: Different latent dimensions
  - name: "latent_dim_256"
    description: "Small latent dimension"
    overrides:
      experiment:
        name: "lfn_latent_256"
      model:
        latent_dim: 256
        num_heads: 4

  - name: "latent_dim_512"
    description: "Default latent dimension"
    overrides:
      experiment:
        name: "lfn_latent_512"
      model:
        latent_dim: 512
        num_heads: 8

  - name: "latent_dim_1024"
    description: "Large latent dimension"
    overrides:
      experiment:
        name: "lfn_latent_1024"
      model:
        latent_dim: 1024
        num_heads: 16

  # Ablation 4: Different model depths
  - name: "layers_4"
    description: "Shallow model"
    overrides:
      experiment:
        name: "lfn_layers_4"
      model:
        num_layers: 4

  - name: "layers_6"
    description: "Default depth"
    overrides:
      experiment:
        name: "lfn_layers_6"
      model:
        num_layers: 6

  - name: "layers_8"
    description: "Deep model"
    overrides:
      experiment:
        name: "lfn_layers_8"
      model:
        num_layers: 8

# Comparison metrics to track
comparison_metrics:
  - "perplexity"
  - "token_loss"
  - "latent_loss"
  - "lps_scores"
  - "horizon_mse"
  - "training_time"
  - "gpu_memory_usage"
  - "linear_probe_accuracy"  # New: downstream evaluation
  - "representation_cka"     # New: representation similarity
  - "latent_entropy"
  - "latent_variance"
  - "cosine_similarity_drift"
  - "cluster_separability"

# Visualization settings
visualization:
  generate_comparison_plots: true
  plot_types:
    - "perplexity_comparison"
    - "lps_comparison"
    - "loss_curves"
    - "representation_metrics"
    - "lambda_ablation_analysis"
    - "horizon_ablation_analysis"
    - "downstream_task_comparison"
