# WikiText-2 Small Model Configuration
# Designed for Apple Silicon (MPS) or CPU training
# Produces real experimental results for the research paper

experiment:
  name: "lfn_wikitext2_small_real"
  seed: 42
  output_dir: "experiments/results/wikitext2_real"

model:
  vocab_size: 50257    # GPT-2 BPE tokenizer
  latent_dim: 256
  num_layers: 4
  num_heads: 4
  hidden_dim: 1024
  dropout: 0.1
  forecast_horizons: [1, 2, 5]
  max_context_length: 256

data:
  dataset_name: "wikitext-2"
  tokenizer_name: "gpt2"
  context_length: 256
  stride: 128
  batch_size: 8
  num_workers: 0       # MPS-safe: no multiprocessing

training:
  num_epochs: 3
  batch_size: 8
  learning_rate: 3e-4
  weight_decay: 0.01
  gradient_accumulation_steps: 4   # effective batch size = 32
  max_grad_norm: 1.0
  warmup_steps: 200
  lambda_latent: 0.1
  use_mixed_precision: false       # MPS does not support FP16 AMP
  checkpoint_every: 500
  log_every: 50
  seed: 42
